<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-4">
      <div class="container-fluid">
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="/produtos/listarprodutos">Produtos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="logout">Sair</a>
            </li>
          </ul>
          <form method="get" action="/produtos/listarprodutos" class="d-flex" role="search">
            <input name="busca" class="form-control me-2" type="search" placeholder="Digite para pesquisar" aria-label="Search">
            <button class="btn btn-outline-success" type="submit">Buscar</button>
          </form>
        </div>
      </div>
    </nav>
    
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Meus Produtos</h3>
        <a href="/produtos/cadastroProduto" class="btn btn-primary">Novo Produto</a>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-0">
          <table class="table table-striped table-hover align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th scope="col" class="ps-3">Nome</th>
                <th scope="col">Categoria</th>
                <th scope="col">Preço</th>
                <th scope="col">Fornecedor</th>
                <th scope="col" class="text-center">Ações</th>
              </tr>
            </thead>
            <tbody>
                {% for produto in produtos %}
                    <tr>
                        <td class="ps-3">{{ produto.nome }}</td>
                        <td>{{ produto.categoria }}</td>
                        <td>R$ {{ produto.preco|floatformat:2 }}</td>
                        <td>{{ produto.get_fornecedor_nome }}</td>
                        <td class="text-center">
                          <a href="/produtos/editarProduto/{{produto.id}}" class="btn btn-secondary btn-sm">Editar</a>
                          <a href="/produtos/excluirProduto/{{produto.id}}" class="btn btn-danger btn-sm">Excluir</a>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
